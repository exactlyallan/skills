name: Skill Catalog Sync Check

on:
  schedule:
    - cron: "0 8 * * *" # every day at 08:00 UTC
  workflow_dispatch: # allow manual trigger
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  check-skills:
    name: Verify skill counts match source repos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check skill directories and update README if drifted
        id: sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          DRIFTED=0

          # Each entry: "owner/repo ref skills_path expected_count label"
          REPOS=(
            "NVIDIA/cuopt                          main skills                                                  19 cuOpt"
            "NVIDIA/TensorRT-LLM                   main .claude/skills                                           4 TensorRT-LLM"
            "NVIDIA/Model-Optimizer                main .claude/skills                                           4 Model-Optimizer"
            "NVIDIA/Megatron-LM                    main .claude/skills                                           2 Megatron-Core"
            "NVIDIA-NeMo/Megatron-Bridge           main skills                                                   8 Megatron-Bridge"
            "NVIDIA-AI-Blueprints/nemotron-voice-agent main .agents/skills                                       1 Nemotron-Voice-Agent"
            "NVIDIA-NeMo/Gym                       main .claude/skills                                           1 NeMo-Gym"
            "NVIDIA-NeMo/Evaluator                 main packages/nemo-evaluator-launcher/.claude/skills           4 NeMo-Evaluator"
          )

          REPORT="## Skill Catalog Sync Report\n\n"
          REPORT+="| Product | Expected | Actual | Status |\n"
          REPORT+="|---------|----------|--------|--------|\n"

          declare -A UPDATES

          for entry in "${REPOS[@]}"; do
            read -r owner_repo ref skills_path expected label <<< "$entry"

            actual=$(gh api \
              "repos/${owner_repo}/contents/${skills_path}?ref=${ref}" \
              --jq '[.[] | select(.type == "dir")] | length' 2>/dev/null || echo "ERR")

            if [ "$actual" = "ERR" ]; then
              REPORT+="| $label | $expected | ERROR | :x: |\n"
              DRIFTED=1
            elif [ "$actual" -eq "$expected" ]; then
              REPORT+="| $label | $expected | $actual | :white_check_mark: |\n"
            else
              REPORT+="| $label | $expected | $actual | :warning: DRIFT |\n"
              UPDATES["$label"]="$expected:$actual"
              DRIFTED=1
            fi
          done

          echo -e "$REPORT"
          echo "drifted=$DRIFTED" >> "$GITHUB_OUTPUT"

          if [ "$DRIFTED" -eq 0 ]; then
            echo "All skill counts match."
            exit 0
          fi

          # On PRs, just fail — don't try to auto-fix
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "::error::Skill counts have drifted — update README.md to match source repos."
            exit 1
          fi

          # On schedule/dispatch, update README.md with corrected counts
          echo "Updating README.md with corrected skill counts..."
          for label in "${!UPDATES[@]}"; do
            IFS=':' read -r old_count new_count <<< "${UPDATES[$label]}"
            # Match the skills count column in the Available Skills table row for this product
            sed -i -E "s/(\*\*${label}\*\*[^|]*\|[^|]*\| *)${old_count}( *\|)/\1${new_count}\2/" README.md
          done

          if git diff --quiet README.md; then
            echo "No changes to README.md after sed — manual update may be needed."
            exit 1
          fi

          echo -e "$REPORT" > /tmp/pr-body.md

      - name: Create pull request with updated counts
        if: steps.sync.outputs.drifted == '1' && github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: update skill counts to match source repos"
          branch: auto/sync-skill-counts
          delete-branch: true
          title: "fix: sync skill counts with source repos"
          body-path: /tmp/pr-body.md
          labels: automated
