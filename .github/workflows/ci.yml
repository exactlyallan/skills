name: Agent Skills Sync Check

on:
  schedule:
    - cron: "0 8 * * *" # every day at 08:00 UTC
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  check-skills:
    name: Verify skill counts match source repos
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      drifted: ${{ steps.sync.outputs.drifted }}
    steps:
      - uses: actions/checkout@v4

      - name: Check skill directories in source repos
        id: sync
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          DRIFTED=0

          # Format: "display_name|owner/repo|ref|skills_path[+extra_path]|expected_count"
          REPOS=(
            "cuOpt|NVIDIA/cuopt|main|skills|19"
            "TensorRT-LLM|NVIDIA/TensorRT-LLM|main|.claude/skills|20"
            "Model-Optimizer|NVIDIA/Model-Optimizer|main|.claude/skills|4"
            "Megatron-Core|NVIDIA/Megatron-LM|main|.claude/skills|2"
            "Megatron-Bridge|NVIDIA-NeMo/Megatron-Bridge|main|skills|8"
            "Nemotron Voice Agent|NVIDIA-AI-Blueprints/nemotron-voice-agent|main|.agents/skills|1"
            "NeMo Gym|NVIDIA-NeMo/Gym|main|.claude/skills|1"
            "NeMo Evaluator|NVIDIA-NeMo/Evaluator|main|packages/nemo-evaluator-launcher/.claude/skills+packages/nemo-evaluator/.claude/skills|4"
          )

          REPORT="## Skill Catalog Sync Report\n\n"
          REPORT+="| Product | Expected | Actual | Status |\n"
          REPORT+="|---------|----------|--------|--------|\n"

          declare -A UPDATES

          count_skills_in_path() {
            local repo="$1" ref="$2" path="$3"
            local result
            result=$(gh api "repos/${repo}/contents/${path}?ref=${ref}" \
              --jq '[.[] | select(.type == "dir")] | length' 2>&1)
            if [ $? -ne 0 ]; then
              echo "ERR:${result}" 
            else
              echo "$result"
            fi
          }

          for entry in "${REPOS[@]}"; do
            IFS='|' read -r label owner_repo ref skills_paths expected <<< "$entry"

            # Sum skill counts across all paths (split on +)
            actual=0
            error_msg=""
            IFS='+' read -ra PATHS <<< "$skills_paths"
            for spath in "${PATHS[@]}"; do
              count=$(count_skills_in_path "$owner_repo" "$ref" "$spath")
              if [[ "$count" == ERR:* ]]; then
                error_msg="${count#ERR:}"
                break
              fi
              actual=$((actual + count))
            done

            if [ -n "$error_msg" ]; then
              REPORT+="| $label | $expected | ERROR | :x: ${error_msg} |\n"
              echo "::error::${label}: ${error_msg}"
              DRIFTED=1
            elif [ "$actual" -eq "$expected" ]; then
              REPORT+="| $label | $expected | $actual | :white_check_mark: |\n"
            else
              REPORT+="| $label | $expected | $actual | :warning: DRIFT |\n"
              UPDATES["$label"]="$expected:$actual"
              DRIFTED=1
            fi
          done

          echo -e "$REPORT"
          echo -e "$REPORT" > /tmp/sync-report.md
          echo "drifted=$DRIFTED" >> "$GITHUB_OUTPUT"

          if [ "$DRIFTED" -ne 0 ]; then
            echo "::error::Skill counts have drifted — update README.md to match source repos."

            # Persist updates for the fix job
            for label in "${!UPDATES[@]}"; do
              echo "${label}=${UPDATES[$label]}"
            done > /tmp/updates.txt
          fi

      - name: Upload sync artifacts
        if: steps.sync.outputs.drifted == '1'
        uses: actions/upload-artifact@v4
        with:
          name: sync-data
          path: |
            /tmp/sync-report.md
            /tmp/updates.txt

      - name: Fail check on drift
        if: steps.sync.outputs.drifted == '1'
        run: exit 1

  fix-drift:
    name: Create PR with corrected skill counts
    needs: check-skills
    if: needs.check-skills.outputs.drifted == '1' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download sync artifacts
        uses: actions/download-artifact@v4
        with:
          name: sync-data
          path: /tmp

      - name: Update README.md with corrected counts
        run: |
          set -euo pipefail

          while IFS='=' read -r label counts; do
            IFS=':' read -r old_count new_count <<< "$counts"
            # Escape spaces in label for sed; match bold product name in table row
            escaped_label=$(echo "$label" | sed 's/ /[[:space:]]/g')
            sed -i -E "s/(\*\*${escaped_label}\*\*[^|]*\|[^|]*\| *)${old_count}( *\|)/\1${new_count}\2/" README.md
          done < /tmp/updates.txt

          if git diff --quiet README.md; then
            echo "::error::No changes to README.md after update — manual fix may be needed."
            exit 1
          fi

          echo "README.md updated:"
          git diff README.md

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: update skill counts to match source repos"
          branch: auto/sync-skill-counts
          delete-branch: true
          title: "fix: sync skill counts with source repos"
          body-path: /tmp/sync-report.md
          labels: automated
